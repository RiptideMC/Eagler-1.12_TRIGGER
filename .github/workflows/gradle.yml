name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Eaglercraft Client
      run: |
        chmod +x gradlew
        ./gradlew client --no-daemon || ./gradlew teavmCompile --no-daemon || ./gradlew build --no-daemon

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Eagler-Web-Client
        path: |
          build/javascript/**/*
          build/teavm/**/*
          build/distributions/**/*
          javascript/**/*

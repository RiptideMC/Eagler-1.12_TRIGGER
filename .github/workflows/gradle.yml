name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Brute Force Build
      run: |
        chmod +x gradlew
        # This tries every common Eaglercraft build command
        ./gradlew :client:build || ./gradlew :gateway:build || ./gradlew build || echo "Standard build failed"
        
    - name: Upload Everything
      uses: actions/upload-artifact@v4
      with:
        name: Eagler-Search-Results
        path: |
          **/*.html
          **/*.js
          **/*.epk
          **/*.jar

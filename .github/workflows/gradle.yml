name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Eaglercraft Client
      run: |
        chmod +x gradlew
        ./gradlew clean client teavmCompile build --no-daemon || ./gradlew build --no-daemon
        echo "--- SEARCHING FOR COMPILED WEB FILES ---"
        find . -name "index.html"
        find . -name "classes.js"
        find . -name "*.epk"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Eagler-Web-Client
        path: |
          build/javascript/**/*
          build/teavm/**/*
          javascript_dist/**/*
          build/distributions/*.html
          build/distributions/*.js
          **/index.html
          **/classes.js
          **/*.epk

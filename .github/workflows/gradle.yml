name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Eaglercraft Client
      run: |
        chmod +x gradlew
        ./gradlew clean build --no-daemon
        echo "--- SEARCHING FOR ALL CREATED FILES ---"
        find . -maxdepth 4 -not -path '*/.*'

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Eagler-Web-Client
        path: |
          build/distributions/**
          javascript/**
          build/teavm/**
          *.html
